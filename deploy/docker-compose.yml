# =====================================================
# QQ 农场智能助手 - 一键部署配置
# =====================================================
# 使用方法:
#   启动：  docker compose up -d
#   停止：  docker compose down
#   日志：  docker compose logs -f
#   更新：  docker compose pull && docker compose up -d
# =====================================================

services:
  # ========== 主应用（Node.js + Vue 前端）==========
  qq-farm-bot:
    image: smdk000/qq-farm-bot-ui:latest
    container_name: qq-farm-bot
    restart: unless-stopped

    ports:
      - "${WEB_PORT:-3080}:3000"

    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-qq007qq008}
      - TZ=${TZ:-Asia/Shanghai}
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # 数据库（Docker 内部网络自动解析）
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-qq_farm_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-qq007qq008}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-qq_farm}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # 微信协议服务
      - IPAD860_URL=http://ipad860:8058

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      ipad860:
        condition: service_started

    volumes:
      # 核心数据（账号、SQLite 备份等）
      - bot-data:/app/core/data
      # 日志文件
      - bot-logs:/app/core/logs

    networks:
      - farm-net

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # ========== MySQL 8.0 数据库 ==========
  mysql:
    image: mysql:8.0
    container_name: qq-farm-mysql
    restart: unless-stopped

    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-qq007qq008}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-qq_farm}
      - MYSQL_USER=${MYSQL_USER:-qq_farm_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-qq007qq008}
      - TZ=${TZ:-Asia/Shanghai}

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

    volumes:
      # 数据持久化
      - mysql-data:/var/lib/mysql
      # ⭐ 首次启动自动执行建表脚本（仅数据卷为空时执行）
      - ./init-db:/docker-entrypoint-initdb.d:ro

    networks:
      - farm-net

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ========== Redis 7 缓存 ==========
  redis:
    image: redis:7-alpine
    container_name: qq-farm-redis
    restart: unless-stopped

    command: redis-server --appendonly yes

    volumes:
      - redis-data:/data

    networks:
      farm-net:
        aliases:
          - redis

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          memory: 128M

  # ========== Ipad860 微信协议服务（Go）==========
  ipad860:
    image: smdk000/ipad860:latest
    # 注意：.so 共享库仅有 x86-64 版本
    platform: linux/amd64
    container_name: qq-farm-ipad860
    restart: unless-stopped

    environment:
      - TZ=${TZ:-Asia/Shanghai}

    depends_on:
      - redis

    networks:
      - farm-net

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

# ========== 网络定义 ==========
networks:
  farm-net:
    driver: bridge

# ========== 数据卷定义 ==========
volumes:
  bot-data:
    driver: local
  bot-logs:
    driver: local
  mysql-data:
    driver: local
  redis-data:
    driver: local
