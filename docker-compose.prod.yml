# QQ 农场助手 - 全栈极简生产环境 Docker Compose 配置
# 使用方法:
#   启动：docker compose up -d (注意: 不再需要 -f 参数, 系统原生新版推荐)
#   停止：docker compose down
#   查看日志：docker compose logs -f
#   更新：docker compose pull && docker compose up -d

services:
  # ========== 主应用（Node.js + Vue 前端）==========
  qq-farm-bot-ui:
    image: smdk000/qq-farm-bot-ui:latest
    # 或者使用 GitHub Container Registry:
    # image: ghcr.io/smdk000/qq-farm-bot-ui:latest
    container_name: qq-farm-bot-ui
    hostname: qq-farm-bot
    restart: unless-stopped
    ports:
      - "${PORT:-3080}:3000"

    environment:
      # 管理员核心密码 (通过 .env 或者系统变量投递)
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-qq007qq008}
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - LOG_LEVEL=info
      # 数据库（Docker 内部网络自动解析关联）
      - MYSQL_HOST=qq-farm-mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-qq_farm_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-qq007qq008}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-qq_farm}
      # Redis 解析
      - REDIS_HOST=ipad860-redis
      - REDIS_PORT=6379
      # Wx 协议端
      - IPAD860_URL=http://ipad860:8058

    depends_on:
      qq-farm-mysql:
        condition: service_healthy
      ipad860:
        condition: service_started
      ipad860-redis:
        condition: service_started

    volumes:
      - ./data:/app/core/data
      - ./logs:/app/core/logs
      - ./backup:/app/core/backup

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3000/api/ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - qq-farm-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  # ========== MySQL 8.0 数据库 ==========
  qq-farm-mysql:
    image: mysql:8.0
    container_name: qq-farm-mysql
    restart: unless-stopped

    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-qq007qq008}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-qq_farm}
      - MYSQL_USER=${MYSQL_USER:-qq_farm_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-qq007qq008}
      - TZ=Asia/Shanghai

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

    volumes:
      # 数据持久化
      - ./mysql-data:/var/lib/mysql
      # ⭐ 若您的宿主机挂载了初始化的目录映射，即可热插入初始化 sql （此为保留设计可用）
      - ./init-db:/docker-entrypoint-initdb.d:ro

    networks:
      - qq-farm-network

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ========== Ipad860 微信协议服务 ==========
  ipad860:
    image: smdk000/ipad860:latest
    platform: linux/amd64 # 注意：含有.so包的专用模拟，ARM 采用 QEMU 适配
    container_name: ipad860
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - ipad860-redis
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks:
      - qq-farm-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========== Redis ==========
  ipad860-redis:
    image: redis:7-alpine
    container_name: ipad860-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./redis-data:/data
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - qq-farm-network

# 网络定义
networks:
  qq-farm-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
